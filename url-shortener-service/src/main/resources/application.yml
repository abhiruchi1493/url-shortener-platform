server:
  port: 8081

spring:
  application:
    name: url-shortener-service
  datasource:
    url: jdbc:postgresql://localhost:5432/url_shortener
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092

app:
  base-url: http://localhost:8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
